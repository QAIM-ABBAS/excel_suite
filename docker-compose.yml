services:
  excel-suite:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: excel-suite
    restart: unless-stopped

    init: true

    ports:
      - "8080:3000"

    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/db/custom.db

    volumes:
      - excel-db:/app/db
      - excel-downloads:/app/download

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

volumes:
  excel-db:
  excel-downloads: